<h2 class="sr-only">Jal Rekha O&M Billing – interactive multi-stage workflow simulator showing all 13 approval stages from Firm submission to MD final approval</h2>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans)}
#app{padding:12px 0}
.hdr{background:#002060;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-radius:var(--border-radius-lg) var(--border-radius-lg) 0 0}
.hdr-title{font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px}
.hdr-user{font-size:11px;opacity:.7}
.layout{display:flex;min-height:420px;border:0.5px solid var(--color-border-tertiary);border-top:none;border-radius:0 0 var(--border-radius-lg) var(--border-radius-lg);overflow:hidden}
.sidebar{width:148px;background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);flex-shrink:0;padding:8px 0}
.si{padding:7px 14px;font-size:12px;color:var(--color-text-secondary);cursor:pointer}
.si.active{background:var(--color-background-info);color:var(--color-text-info);font-weight:500;border-left:2.5px solid var(--color-border-info)}
.si.sub{padding-left:22px;font-size:11px}
.main{flex:1;padding:14px;overflow-y:auto;background:var(--color-background-primary)}
.wf-bar{display:flex;margin-bottom:14px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);overflow:hidden}
.wf-s{flex:1;padding:5px 4px;font-size:9px;text-align:center;color:var(--color-text-secondary);background:var(--color-background-secondary);border-right:0.5px solid var(--color-border-tertiary);cursor:pointer;transition:background .15s;line-height:1.3}
.wf-s:last-child{border-right:none}
.wf-s.done{background:#E1F5EE;color:#0F6E56}
.wf-s.active{background:#002060;color:#fff;font-weight:500}
.wf-s.todo{opacity:.5}
.sec-title{font-size:12px;font-weight:500;color:var(--color-text-primary);padding-bottom:7px;margin-bottom:10px;border-bottom:0.5px solid var(--color-border-tertiary)}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.fg3{grid-template-columns:1fr 1fr 1fr}
.fl{font-size:10px;color:var(--color-text-secondary);margin-bottom:3px}
.fi{height:27px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);padding:0 8px;font-size:11px;color:var(--color-text-primary);width:100%;display:flex;align-items:center}
.fi.edit{border-color:var(--color-border-info);background:var(--color-background-info)}
.btns{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
button{padding:6px 13px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);font-size:11px;font-weight:500;cursor:pointer;background:var(--color-background-primary);color:var(--color-text-primary)}
button:hover{background:var(--color-background-secondary)}
.btn-p{background:#002060!important;color:#fff!important;border-color:#002060!important}
.btn-g{background:#C9A227!important;color:#fff!important;border-color:#C9A227!important}
.btn-d{background:var(--color-background-danger)!important;color:var(--color-text-danger)!important;border-color:var(--color-border-danger)!important}
.doc-row{display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px}
.doc-ico{width:20px;height:20px;border:0.5px solid var(--color-border-tertiary);border-radius:3px;display:flex;align-items:center;justify-content:center;color:var(--color-text-tertiary);flex-shrink:0}
.doc-name{flex:1;color:var(--color-text-primary)}
.doc-tag{font-size:9px;color:var(--color-text-danger)}
.dac{display:flex;gap:4px}
.db{padding:2px 7px;font-size:10px;border:0.5px solid var(--color-border-secondary);border-radius:4px;background:var(--color-background-secondary);color:var(--color-text-secondary);cursor:pointer}
.db.up{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.db.view{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
.tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.tbl th{padding:5px 7px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);font-weight:500;font-size:10px;color:var(--color-text-secondary);text-align:left}
.tbl td{padding:5px 7px;border:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:500}
.bp{background:#FAEEDA;color:#633806}
.br{background:#E6F1FB;color:#0C447C}
.bd{background:#EAF3DE;color:#27500A}
.ba{background:#002060;color:#fff}
.notif{background:var(--color-background-success);color:var(--color-text-success);border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:8px 12px;font-size:11px;margin-bottom:10px;display:none;align-items:center;gap:8px}
.notif.show{display:flex}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.card{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:10px 12px}
.cv{font-size:18px;font-weight:500;color:var(--color-text-primary)}
.cl{font-size:10px;color:var(--color-text-secondary);margin-top:2px}
.page{display:none}
.page.active{display:block}
.trail{background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:10px;color:var(--color-text-secondary);margin-bottom:10px;line-height:1.8}
.trail b{color:var(--color-text-primary);font-weight:500}
</style>

<div id="app">
<div class="hdr">
  <div class="hdr-title"><i class="ti ti-droplet" aria-hidden="true"></i> Jal Rekha – O&M Billing workflow</div>
  <div class="hdr-user" id="hdr-user">Firm: ABC Water Infra Pvt. Ltd.</div>
</div>

<div class="wf-bar" id="wf-bar"></div>

<div class="layout">
  <div class="sidebar">
    <div class="si">Dashboard</div>
    <div class="si active">O&M Billing</div>
    <div class="si sub active" id="sb1">View pending bills</div>
    <div class="si sub" id="sb2">Manage bill</div>
    <div class="si sub" id="sb3" style="display:none">Documents</div>
  </div>
  <div class="main" id="main-area">
  </div>
</div>

<div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
  <button onclick="prevStep()" id="btn-prev" style="display:none"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>
  <span style="font-size:11px;color:var(--color-text-secondary);align-self:center" id="step-label"></span>
  <button onclick="sendPrompt('Tell me more about the O&M billing workflow and document requirements')" style="margin-left:auto">Ask about this step ↗</button>
</div>
</div>

<script>
const STAGES = [
  {id:'firm',   label:'Firm',       user:'Firm: ABC Water Infra Pvt. Ltd.'},
  {id:'gmpiu1', label:'GM (PIU)',   user:'GM (PIU): Indore'},
  {id:'tlcsc',  label:'TL (CSC)',   user:'TL (CSC): Indore Zone'},
  {id:'gmpiu2', label:'GM (PIU) ✓',user:'GM (PIU): Indore – Document upload'},
  {id:'gmo1',   label:'GM (O&M)',   user:'GM (O&M): Bhopal HO'},
  {id:'tlpmc',  label:'TL (PMC)',   user:'TL (PMC): Bhopal HO'},
  {id:'dgmo',   label:'DGM (O&M)', user:'DGM (O&M): Bhopal HO'},
  {id:'gmo2',   label:'GM (O&M) ✓',user:'GM (O&M): Pass order upload'},
  {id:'cgm',    label:'CGM',        user:'CGM: Indore Region'},
  {id:'ca',     label:'CA',         user:'CA: Finance – Bhopal HO'},
  {id:'cfo',    label:'CFO',        user:'CFO: Finance – Bhopal HO'},
  {id:'pd',     label:'P.D.',       user:'P.D.: Head Office'},
  {id:'md',     label:'MD',         user:'MD: Jal Nigam HO'},
];

let step = 0;
let uploadedDocs = {};
let formData = {scheme:'Bagh MVS',month:'April 2026',ra:'RA-09 (auto)',amount:'14,20,000',base:'12,80,000',cpwi:'1,40,000',deduct:'0',net:'14,20,000',remarks:''};

function buildWFBar(){
  const bar = document.getElementById('wf-bar');
  bar.innerHTML = STAGES.map((s,i)=>`<div class="wf-s ${i<step?'done':i===step?'active':'todo'}" onclick="goStep(${i})">${s.label}</div>`).join('');
}

function goStep(i){
  if(i > step) return;
  step = i;
  render();
}

function render(){
  buildWFBar();
  document.getElementById('hdr-user').textContent = STAGES[step].user;
  document.getElementById('step-label').textContent = `Stage ${step+1} of ${STAGES.length}: ${STAGES[step].label}`;
  document.getElementById('btn-prev').style.display = step > 0 ? '' : 'none';
  document.getElementById('sb3').style.display = step >= 1 ? '' : 'none';

  const m = document.getElementById('main-area');
  const id = STAGES[step].id;
  const renders = {firm:renderFirm,gmpiu1:renderGMPIU1,tlcsc:renderTLCSC,gmpiu2:renderGMPIU2,gmo1:renderGMO1,tlpmc:renderTLPMC,dgmo:renderDGMO,gmo2:renderGMO2,cgm:renderCGM,ca:renderCA,cfo:renderCFO,pd:renderPD,md:renderMD};
  m.innerHTML = renders[id]();
}

function nextStep(){ if(step < STAGES.length-1){step++;render();} }
function prevStep(){ if(step > 0){step--;render();} }
function upload(key){uploadedDocs[key]=true;render();}
function docRow(key,name,mandatory,uploaded){
  const u = uploadedDocs[key]||false;
  return `<div class="doc-row">
    <div class="doc-ico"><i class="ti ti-file-text" aria-hidden="true" style="font-size:12px"></i></div>
    <div class="doc-name">${name} ${mandatory?'<span class="doc-tag">*required</span>':''}</div>
    <div class="dac">
      ${u?`<span class="db view"><i class="ti ti-check" aria-hidden="true"></i> Uploaded</span><span class="db view">View PDF</span><span class="db">Download</span>`:`<span class="db up" onclick="upload('${key}')">Upload</span>`}
    </div>
  </div>`;
}
function notif(msg){return `<div class="notif show"><i class="ti ti-check" aria-hidden="true"></i> ${msg}</div>`;}
function trail(steps){return `<div class="trail"><b>Approval trail:</b> ${steps.join(' → ')}</div>`;}

function renderFirm(){
  return `
    <div class="sec-title">O&M billing – new bill submission</div>
    <div class="cards">
      <div class="card"><div class="cv">3</div><div class="cl">Bills generated</div></div>
      <div class="card"><div class="cv">1</div><div class="cl">Awaiting forward</div></div>
      <div class="card"><div class="cv">2</div><div class="cl">Under review</div></div>
    </div>
    <table class="tbl" style="margin-bottom:12px">
      <colgroup><col width="120"><col width="90"><col width="75"><col width="75"><col width="80"><col width="100"></colgroup>
      <thead><tr><th>Bill no.</th><th>Scheme</th><th>Month</th><th>Amount</th><th>Status</th><th>Action</th></tr></thead>
      <tbody>
        <tr><td>OM/2026/041</td><td>Bagh MVS</td><td>Apr 2026</td><td>₹14.2L</td><td><span class="badge bp">Draft</span></td>
          <td><button class="btn-g" style="font-size:10px;padding:3px 9px" onclick="nextStep()">Forward to GM (PIU) ↗</button></td></tr>
        <tr><td>OM/2026/033</td><td>Rajond MVS</td><td>Mar 2026</td><td>₹11.8L</td><td><span class="badge br">At TL (CSC)</span></td><td><button style="font-size:10px;padding:3px 8px">View</button></td></tr>
        <tr><td>OM/2026/021</td><td>Punjapura</td><td>Feb 2026</td><td>₹9.4L</td><td><span class="badge bd">Approved</span></td><td><button style="font-size:10px;padding:3px 8px">View</button></td></tr>
      </tbody>
    </table>
    <div class="sec-title">Bill entry – OM/2026/041</div>
    <div class="form-grid">
      <div><div class="fl">Scheme</div><div class="fi">Bagh MVS</div></div>
      <div><div class="fl">Billing month</div><div class="fi">April 2026</div></div>
      <div><div class="fl">RA Bill no. (auto)</div><div class="fi">RA-09</div></div>
      <div><div class="fl">Total amount (₹)</div><div class="fi">14,20,000</div></div>
    </div>
    ${docRow('firm_sub','Firm submission letter',true,false)}
    ${docRow('tax_inv','Tax invoice',true,false)}
    ${docRow('elec_bill','Electricity bill',false,false)}
    ${docRow('phe_test','PHE test report',false,false)}
    ${docRow('firm_other','Any other documents (multiple)',false,false)}
    <div class="btns">
      <button>Save draft</button>
      <button class="btn-g" onclick="nextStep()">Submit &amp; forward to GM (PIU) ↗</button>
    </div>`;
}

function renderGMPIU1(){
  return `
    ${notif('Bill OM/2026/041 received from Firm – ABC Water Infra Pvt. Ltd.')}
    <div class="sec-title">Pending bills – GM (PIU) action</div>
    ${trail(['Firm ✓','GM (PIU) ←'])}
    <table class="tbl" style="margin-bottom:12px">
      <colgroup><col width="110"><col width="90"><col width="90"><col width="70"><col width="65"><col width="115"></colgroup>
      <thead><tr><th>Bill no.</th><th>Scheme</th><th>Firm</th><th>Amount</th><th>Days</th><th>Action</th></tr></thead>
      <tbody>
        <tr><td>OM/2026/041</td><td>Bagh MVS</td><td>ABC Water</td><td>₹14.2L</td><td>1</td>
          <td><button class="btn-p" style="font-size:10px;padding:3px 9px" onclick="nextStep()">Forward to TL (CSC) ↗</button></td></tr>
      </tbody>
    </table>
    <div class="sec-title">Uploaded by firm – view only</div>
    ${docRow('firm_sub','Firm submission letter',false,true)}
    ${docRow('tax_inv','Tax invoice',false,true)}
    <div class="btns">
      <button class="btn-d">Hold with remark</button>
      <button class="btn-p" onclick="nextStep()">Forward to TL (CSC) ↗</button>
    </div>`;
}

function renderTLCSC(){
  return `
    ${notif('Bill forwarded by GM (PIU) Indore – pending your review.')}
    <div class="sec-title">TL (CSC) – add / edit bill data &amp; recommendation</div>
    ${trail(['Firm ✓','GM (PIU) ✓','TL (CSC) ←'])}
    <div class="form-grid fg3">
      <div><div class="fl">Base O&M amount (₹)</div><div class="fi edit">12,80,000</div></div>
      <div><div class="fl">CPWI adjustment (₹)</div><div class="fi edit">1,40,000</div></div>
      <div><div class="fl">Penalty / deduction (₹)</div><div class="fi edit">0</div></div>
      <div><div class="fl">Yearly factor (%)</div><div class="fi edit">5.2</div></div>
      <div><div class="fl">Net payable (₹)</div><div class="fi">14,20,000</div></div>
      <div><div class="fl">Recommendation</div><div class="fi edit">Recommended</div></div>
    </div>
    ${docRow('tlcsc_rec','SQC / TL recommendation letter',true,uploadedDocs['tlcsc_rec'])}
    ${docRow('tpwq','Third party water quality test report (multiple)',false,uploadedDocs['tpwq'])}
    ${docRow('tlcsc_other','Any other documents',false,false)}
    <div class="btns">
      <button class="btn-d">Hold – needs correction</button>
      <button class="btn-p" onclick="${uploadedDocs['tlcsc_rec']?'nextStep()':'upload(\"tlcsc_rec\")'}">${uploadedDocs['tlcsc_rec']?'Forward to GM (PIU) ↗':'Upload recommendation &amp; forward ↗'}</button>
    </div>`;
}

function renderGMPIU2(){
  const allUp = uploadedDocs['signed_mb'] && uploadedDocs['signed_abs'] && uploadedDocs['bill_sheet'] && uploadedDocs['form27a'];
  return `
    ${notif('TL (CSC) recommendation received – please upload signed documents.')}
    <div class="sec-title">GM (PIU) – final data entry &amp; signed document upload</div>
    ${trail(['Firm ✓','GM (PIU) ✓','TL (CSC) ✓','GM (PIU) upload ←'])}
    <div class="form-grid">
      <div><div class="fl">Net payable confirmed (₹)</div><div class="fi">14,20,000</div></div>
      <div><div class="fl">GM (PIU) remark</div><div class="fi edit">Approved for forwarding</div></div>
    </div>
    <div class="sec-title" style="margin-top:4px">Signed document upload (all mandatory)</div>
    ${docRow('signed_mb','Signed MB (measurement book)',true,uploadedDocs['signed_mb'])}
    ${docRow('signed_abs','Signed abstract',true,uploadedDocs['signed_abs'])}
    ${docRow('bill_sheet','Signed monthly bill sheet (duly signed by GM PIU)',true,uploadedDocs['bill_sheet'])}
    ${docRow('form27a','Signed Form 27A',true,uploadedDocs['form27a'])}
    ${docRow('relax','Relaxation letter (if applicable)',false,uploadedDocs['relax'])}
    ${docRow('gmpiu_other','Any other documents',false,false)}
    <div class="btns">
      <button class="btn-d">Hold</button>
      <button class="${allUp?'btn-p':'btn-g'}" onclick="${allUp?'nextStep()':'(function(){[\"signed_mb\",\"signed_abs\",\"bill_sheet\",\"form27a\"].forEach(k=>uploadedDocs[k]=true);render();})()'}">${allUp?'Lock details &amp; forward to GM (O&M) ↗':'Upload all &amp; lock ↗'}</button>
    </div>`;
}

function renderGMO1(){
  return `
    ${notif('Bill OM/2026/041 forwarded from GM (PIU) Indore. All documents attached.')}
    <div class="sec-title">GM (O&M) – review &amp; route to TL (PMC)</div>
    ${trail(['Firm ✓','GM (PIU) ✓','TL (CSC) ✓','GM (PIU) ✓','GM (O&M) ←'])}
    <div class="form-grid">
      <div><div class="fl">Scheme</div><div class="fi">Bagh MVS</div></div>
      <div><div class="fl">Net payable (₹)</div><div class="fi">14,20,000</div></div>
      <div><div class="fl">Days at GM (O&M)</div><div class="fi">0</div></div>
      <div><div class="fl">GM (O&M) remarks</div><div class="fi edit">Verified – forwarding to PMC</div></div>
    </div>
    <div class="sec-title">All upstream documents (view only)</div>
    ${docRow('firm_sub','Firm submission letter',false,true)}
    ${docRow('tlcsc_rec','SQC/TL recommendation letter',false,true)}
    ${docRow('signed_mb','Signed MB',false,true)}
    ${docRow('signed_abs','Signed abstract',false,true)}
    ${docRow('bill_sheet','Signed monthly bill sheet',false,true)}
    ${docRow('form27a','Signed Form 27A',false,true)}
    <div class="btns">
      <button class="btn-d">Hold with remarks</button>
      <button class="btn-p" onclick="nextStep()">Forward to TL (PMC) ↗</button>
    </div>`;
}

function renderTLPMC(){
  return `
    ${notif('Bill received from GM (O&M) for PMC recommendation.')}
    <div class="sec-title">TL (PMC) – recommendation with supporting documents</div>
    ${trail(['Firm ✓','GM (PIU) ✓','TL (CSC) ✓','GM (PIU) ✓','GM (O&M) ✓','TL (PMC) ←'])}
    <div class="form-grid">
      <div><div class="fl">PMC review outcome</div><div class="fi edit">Technically verified</div></div>
      <div><div class="fl">PMC recommendation date</div><div class="fi edit">19-Jun-2026</div></div>
    </div>
    ${docRow('pmc_rec','TL (PMC) recommendation letter',true,uploadedDocs['pmc_rec'])}
    ${docRow('pmc_sup','Supporting documents (any)',false,false)}
    <div class="btns">
      <button class="btn-d">Return to GM (O&M)</button>
      <button class="btn-p" onclick="${uploadedDocs['pmc_rec']?'nextStep()':'upload(\"pmc_rec\")'}">${uploadedDocs['pmc_rec']?'Forward to DGM (O&M) ↗':'Upload &amp; forward ↗'}</button>
    </div>`;
}

function renderDGMO(){
  return `
    ${notif('Bill recommended by TL (PMC) – pending DGM review.')}
    <div class="sec-title">DGM (O&M) – approve or hold</div>
    ${trail(['…','GM (O&M) ✓','TL (PMC) ✓','DGM (O&M) ←'])}
    <div class="form-grid fg3">
      <div><div class="fl">Scheme</div><div class="fi">Bagh MVS</div></div>
      <div><div class="fl">Net payable (₹)</div><div class="fi">14,20,000</div></div>
      <div><div class="fl">DGM decision</div><div class="fi edit">Approved</div></div>
    </div>
    ${docRow('dgm_note','DGM approval note (optional)',false,false)}
    <div class="btns">
      <button class="btn-d">Hold – return to TL (PMC)</button>
      <button class="btn-p" onclick="nextStep()">Approve &amp; pass order to GM (O&M) ↗</button>
    </div>`;
}

function renderGMO2(){
  const allUp2 = uploadedDocs['pass_order'] && uploadedDocs['ho_letter'];
  return `
    ${notif('DGM (O&M) approved. Please upload pass order copy and HO letter.')}
    <div class="sec-title">GM (O&M) – pass order &amp; HO letter upload</div>
    ${trail(['…','DGM (O&M) ✓','GM (O&M) pass order ←'])}
    ${docRow('pass_order','Pass order copy (signed by DGM O&M)',true,uploadedDocs['pass_order'])}
    ${docRow('ho_letter','Signed letter from Head Office (HO)',true,uploadedDocs['ho_letter'])}
    <div class="btns">
      <button class="${allUp2?'btn-p':'btn-g'}" onclick="${allUp2?'nextStep()':'(function(){uploadedDocs[\"pass_order\"]=true;uploadedDocs[\"ho_letter\"]=true;render();})()'}">${allUp2?'Forward to CGM ↗':'Upload both &amp; forward ↗'}</button>
    </div>`;
}

function renderCGM(){
  return `
    ${notif('Bill forwarded to CGM – Indore region for regional approval.')}
    <div class="sec-title">CGM – regional office review</div>
    ${trail(['…','GM (O&M) ✓','CGM ←'])}
    <div class="form-grid">
      <div><div class="fl">CGM region</div><div class="fi">Indore</div></div>
      <div><div class="fl">CGM decision</div><div class="fi edit">Approved</div></div>
    </div>
    <div style="background:var(--color-background-secondary);border-radius:var(--border-radius-md);padding:8px 10px;font-size:10px;color:var(--color-text-secondary);margin-bottom:10px">
      CGM offices: <b>Bhopal · Gwalior · Jabalpur · Rewa · Sagar · Indore · Ujjain</b>
    </div>
    ${docRow('cgm_note','CGM review note (optional)',false,false)}
    <div class="btns">
      <button class="btn-d">Return to GM (O&M)</button>
      <button class="btn-p" onclick="nextStep()">Forward to CA ↗</button>
    </div>`;
}

function renderCA(){
  return `
    ${notif('Bill forwarded from CGM Indore for financial review.')}
    <div class="sec-title">CA – financial review</div>
    ${trail(['…','CGM ✓','CA ←'])}
    <div class="form-grid fg3">
      <div><div class="fl">Base O&M (₹)</div><div class="fi">12,80,000</div></div>
      <div><div class="fl">CPWI adjustment (₹)</div><div class="fi">1,40,000</div></div>

      <button class="btn-p" onclick="nextStep()">Sign off &amp; forward to P.D. ↗</button>

}

function renderPD(){
  return `

function renderMD(){
  return `

    ${trail(['Firm ✓','GM PIU ✓','TL CSC ✓','GM PIU ✓','GM O&M ✓','TL PMC ✓','DGM ✓','GM O&M ✓','CGM ✓','CA ✓','CFO ✓','PD ✓','MD ←'])}
    <div class="form-grid fg3">
      <div><div class="fl">Bill no.</div><div class="fi">OM/2026/041</div></div>
      <div><div class="fl">Scheme</div><div class="fi">Bagh MVS</div></div>
      <div><div class="fl">Total incl. GST (₹)</div><div class="fi">16,75,600</div></div>

      <div><div class="fl">MD remarks</div><div class="fi edit">Approved for payment</div></div>
      <div><div class="fl">Approval date</div><div class="fi edit">19-Jun-2026</div></div>
    </div>
    <div id="final-done" style="display:none;background:#EAF3DE;border:0.5px solid var(--color-border-success);border-radius:var(--border-radius-md);padding:14px;margin-top:12px;text-align:center">
      <i class="ti ti-circle-check" aria-hidden="true" style="font-size:24px;color:#27500A"></i>
      <div style="font-size:14px;font-weight:500;color:#27500A;margin-top:6px">Bill OM/2026/041 finally approved!</div>

render();
</script>
